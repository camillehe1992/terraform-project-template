name: Terraform Validate and Plan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ROLE_TO_ASSUME: ${{ secrets.ROLE_TO_ASSUME }}
  GITHUB_REPO_NAME: ${{ github.repository }}

jobs:
  terraform:
    name: Terraform Validate and Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.0"

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=terraform-state-$AWS_ACCOUNT_ID-$AWS_REGION" \
            -backend-config="key=$GITHUB_REPO_NAME/dev/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          PLAN_OUTPUT=$(terraform plan -detailed-exitcode -no-color 2>&1)
          PLAN_EXIT_CODE=$?
          echo "$PLAN_OUTPUT"

          # Store plan output for later steps
          echo "plan_output<<EOF" >> $GITHUB_OUTPUT
          echo "$PLAN_OUTPUT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Store exit code (0=no changes, 1=error, 2=changes detected)
          echo "plan_exit_code=$PLAN_EXIT_CODE" >> $GITHUB_OUTPUT

          # Exit with error code if terraform plan failed (exit code 1)
          if [ $PLAN_EXIT_CODE -eq 1 ]; then
            exit 1
          fi

      - name: Add Plan Summary to GitHub
        if: steps.plan.outputs.plan_exit_code == '2'
        run: |
          echo "## 🚀 Terraform Plan Changes Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Plan Details" >> $GITHUB_STEP_SUMMARY
          echo '```terraform' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.plan.outputs.plan_output }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔍 Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Plan Status: Changes detected" >> $GITHUB_STEP_SUMMARY
          echo "- Review required: Yes" >> $GITHUB_STEP_SUMMARY
          echo "- Action: Please review the plan output above before proceeding" >> $GITHUB_STEP_SUMMARY
