name: Terraform Validate and Plan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ROLE_TO_ASSUME: ${{ secrets.ROLE_TO_ASSUME }}
  GITHUB_REPO_NAME: ${{ github.event.repository.name }}

jobs:
  terraform:
    name: Terraform Validate and Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform
    outputs:
      plan_exit_code: ${{ steps.plan.outputs.plan_exit_code }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.0"

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=terraform-state-$AWS_ACCOUNT_ID-$AWS_REGION" \
            -backend-config="key=$GITHUB_REPO_NAME/dev/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          # Run terraform plan and capture output with exit code
          set +e  # Allow the command to fail without stopping the script
          PLAN_OUTPUT=$(terraform plan -detailed-exitcode -no-color 2>&1)
          PLAN_EXIT_CODE=$?
          set -e  # Re-enable exit on error

          # Debug output to verify exit code capture
          echo "Debug: Terraform plan exit code: $PLAN_EXIT_CODE"
          echo "Debug: Exit code type: $(type $PLAN_EXIT_CODE 2>/dev/null || echo 'integer')"

          # Always show the plan output
          echo "$PLAN_OUTPUT"

          # Store exit code immediately (0=no changes, 1=error, 2=changes detected)
          echo "plan_exit_code=$PLAN_EXIT_CODE" >> $GITHUB_OUTPUT

          # Store plan output using proper multiline format for GitHub Actions
          {
            echo 'plan_output<<EOF'
            echo "$PLAN_OUTPUT"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

          # Exit with error code if terraform plan failed (exit code 1)
          if [ $PLAN_EXIT_CODE -eq 1 ]; then
            echo "Terraform plan failed with exit code 1"
            exit 1
          fi

      - name: Debug Plan Output
        run: |
          echo "Debug: plan_exit_code value: '${{ steps.plan.outputs.plan_exit_code }}'"
          echo "Debug: plan_exit_code length: $(echo -n '${{ steps.plan.outputs.plan_exit_code }}' | wc -c)"
          echo "Debug: Expected exit code 2 for changes, but got: '${{ steps.plan.outputs.plan_exit_code }}'"
          echo "Debug: This suggests terraform plan returned 0 instead of 2"

      - name: Show Plan Output Summary
        run: |
          echo "## 📋 Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo '```terraform' >> $GITHUB_STEP_SUMMARY
          cat << 'EOF' >> $GITHUB_STEP_SUMMARY
          ${{ steps.plan.outputs.plan_output }}
          EOF
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔍 Analysis" >> $GITHUB_STEP_SUMMARY
          echo "- Exit Code: ${{ steps.plan.outputs.plan_exit_code }}" >> $GITHUB_STEP_SUMMARY
          echo "- Expected: 2 (changes), 0 (no changes), or 1 (error)" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY"

      - name: Fallback Debug Summary
        if: always() && steps.plan.outputs.plan_exit_code != '0' && steps.plan.outputs.plan_exit_code != '2'
        run: |
          echo "## ⚠️ Debug: Unexpected Plan Exit Code" >> $GITHUB_STEP_SUMMARY
          echo "Debug: plan_exit_code = '${{ steps.plan.outputs.plan_exit_code }}'" >> $GITHUB_STEP_SUMMARY
          echo "Debug: This might indicate an issue with exit code capture" >> $GITHUB_STEP_SUMMARY

      - name: Add Plan Summary to GitHub
        if: steps.plan.outputs.plan_exit_code == '2'
        run: |
          echo "## 🚀 Terraform Plan Changes Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Plan Details" >> $GITHUB_STEP_SUMMARY
          echo '```terraform' >> $GITHUB_STEP_SUMMARY
          cat << 'EOF' >> $GITHUB_STEP_SUMMARY
          ${{ steps.plan.outputs.plan_output }}
          EOF
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔍 Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Plan Status: ✅ Changes detected" >> $GITHUB_STEP_SUMMARY
          echo "- Review required: ⚠️ Yes" >> $GITHUB_STEP_SUMMARY
          echo "- Action: Please review the plan output above before proceeding" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- Exit Code Confirmed: 2" >> $GITHUB_STEP_SUMMARY

      - name: Add No Changes Summary to GitHub
        if: steps.plan.outputs.plan_exit_code == '0'
        run: |
          echo "## ✅ No Terraform Changes Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Status" >> $GITHUB_STEP_SUMMARY
          echo "- Plan Status: No changes detected" >> $GITHUB_STEP_SUMMARY
          echo "- Review required: No" >> $GITHUB_STEP_SUMMARY
          echo "- Action: Infrastructure is up to date" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
