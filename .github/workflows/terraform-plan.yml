name: Terraform Validate and Plan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ROLE_TO_ASSUME: ${{ secrets.ROLE_TO_ASSUME }}
  GITHUB_REPO_NAME: ${{ github.event.repository.name }}

jobs:
  terraform:
    name: Terraform Validate and Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          # Set terraform_wrapper: false to get the raw exit code
          terraform_wrapper: false
          terraform_version: "1.14.0"

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=terraform-state-$AWS_ACCOUNT_ID-$AWS_REGION" \
            -backend-config="key=$GITHUB_REPO_NAME/dev/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        continue-on-error: true
        run: |
          # Capture both stdout and stderr, and get exit code
          exit_code=0
          terraform plan -detailed-exitcode -no-color -out tfplan || exit_code=$?
          echo "Terraform Plan Exit Code: $exit_code"

          case $exit_code in
            0) echo "✅ No changes detected"; plan_status="✅ No Changes" ;;
            1) echo "❌ Plan failed"; plan_status="❌ Failed" ;;
            2) echo "✅ Changes detected"; plan_status="✅ Changes" ;;
            *) echo "⚠️  Unexpected exit code: $exit_code"; plan_status="⚠️ Unknown" ;;
          esac

          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT

          TERRAFORM_PLAN=$(terraform show -no-color tfplan)

          delimiter="$(openssl rand -hex 8)"
          echo "summary<<${delimiter}" >> $GITHUB_OUTPUT
          echo "### 🚀 Terraform Plan Output" >> $GITHUB_OUTPUT
          echo "<details><summary>Click to expand</summary>" >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo '```terraform' >> $GITHUB_OUTPUT
          echo "$TERRAFORM_PLAN" >> $GITHUB_OUTPUT
          echo '```' >> $GITHUB_OUTPUT
          echo "</details>" >> $GITHUB_OUTPUT

          echo "### 🔍 Analysis" >> $GITHUB_OUTPUT
          echo "- Exit Code: $exit_code" >> $GITHUB_OUTPUT
          echo "- Plan Status: $plan_status" >> $GITHUB_OUTPUT
          echo "- Expected: 2 (changes), 0 (no changes), or 1 (error)" >> $GITHUB_OUTPUT
          echo "- Timestamp: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT

          echo "${delimiter}" >> $GITHUB_OUTPUT

      - name: Publish Terraform Plan Output to Summary
        env:
          SUMMARY: ${{ steps.plan.outputs.summary }}
        run: |
          echo "$SUMMARY" >> $GITHUB_STEP_SUMMARY
