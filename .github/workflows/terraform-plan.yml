name: Terraform Validate and Plan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ROLE_TO_ASSUME: ${{ secrets.ROLE_TO_ASSUME }}
  GITHUB_REPO_NAME: ${{ github.event.repository.name }}

jobs:
  terraform:
    name: Terraform Validate and Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.0"

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=terraform-state-$AWS_ACCOUNT_ID-$AWS_REGION" \
            -backend-config="key=$GITHUB_REPO_NAME/dev/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          # Run terraform plan and capture output with proper exit code handling
          set +e  # Allow the command to fail without stopping the script

          # Capture both stdout and stderr, and get exit code
          terraform plan -detailed-exitcode -no-color -out tfplan
          PLAN_EXIT_CODE=$?

          set -e  # Re-enable exit on error

          # Show full output for debugging
          echo "=== Terraform Plan Output ==="
          echo "$PLAN_OUTPUT"
          echo "============================="
          echo "Terraform Exit Code: $PLAN_EXIT_CODE"

          # Validate exit code is what we expect
          case $PLAN_EXIT_CODE in
            0) echo "✅ No changes detected" ;;
            1) echo "❌ Plan failed" ;;
            2) echo "✅ Changes detected" ;;
            *) echo "⚠️  Unexpected exit code: $PLAN_EXIT_CODE" ;;
          esac

          # Set outputs for next steps
          echo "exit_code=$PLAN_EXIT_CODE" >> $GITHUB_OUTPUT
          echo "plan_output<<EOF" >> $GITHUB_OUTPUT
          echo "$PLAN_OUTPUT"
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Add Plan Output to GitHub Summary
        run: |
          echo "# 📋 Terraform Plan Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          EXIT_CODE=${{ steps.plan.outputs.exit_code }}

          echo "**Debug: Raw exit code from plan step: '$EXIT_CODE'**" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "$EXIT_CODE" = "0" ]; then
            echo "✅ **No changes detected**" >> $GITHUB_STEP_SUMMARY
          elif [ "$EXIT_CODE" = "2" ]; then
            echo "🚀 **Changes detected**" >> $GITHUB_STEP_SUMMARY
          elif [ "$EXIT_CODE" = "1" ]; then
            echo "❌ **Plan failed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ **Unexpected exit code: $EXIT_CODE**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Full Plan Output" >> $GITHUB_STEP_SUMMARY
          echo '```terraform' >> $GITHUB_STEP_SUMMARY
          cat << 'EOF' >> $GITHUB_STEP_SUMMARY
          ${{ steps.plan.outputs.plan_output }}
          EOF
          echo '```' >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "---" >> $GITHUB_STEP_SUMMARY
          echo "**Analysis:** Check if the plan output above shows 'Plan: X to add, Y to change, Z to destroy'" >> $GITHUB_STEP_SUMMARY

      - name: Final Result Check
        run: |
          EXIT_CODE=${{ steps.plan.outputs.exit_code }}
          if [ $EXIT_CODE -eq 1 ]; then
            echo "❌ Plan failed"
            exit 1
          fi
