name: Terraform Validate and Plan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ROLE_TO_ASSUME: ${{ secrets.ROLE_TO_ASSUME }}
  GITHUB_REPO_NAME: ${{ github.event.repository.name }}

jobs:
  terraform:
    name: Terraform Validate and Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          # Set terraform_wrapper: false to get the raw exit code
          terraform_wrapper: false
          terraform_version: "1.14.0"

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=terraform-state-$AWS_ACCOUNT_ID-$AWS_REGION" \
            -backend-config="key=$GITHUB_REPO_NAME/dev/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        continue-on-error: true
        run: |
          # Capture both stdout and stderr, and get exit code
          exit_code=0
          terraform plan -detailed-exitcode -no-color -out tfplan || exit_code=$?
          echo "Terraform Plan Exit Code: $exit_code"

          case $exit_code in
            0) echo "✅ No changes detected" ;;
            1) echo "❌ Plan failed" ;;
            2) echo "✅ Changes detected" ;;
            *) echo "⚠️  Unexpected exit code: $exit_code" ;;
          esac

          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT

          # Store plan output using proper multiline format for GitHub Actions
          PLAN_OUTPUT=$(terraform show -no-color tfplan)
          {
            echo 'plan_output<<EOF'
            echo "$PLAN_OUTPUT"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Show Plan Output Summary
        run: |
          echo "## 📋 Terraform Plan Output" >> $GITHUB_STEP_SUMMARY
          echo '```terraform' >> $GITHUB_STEP_SUMMARY
          echo ${{ steps.plan.outputs.plan_output }} >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 🔍 Analysis" >> $GITHUB_STEP_SUMMARY
          echo "- Exit Code: ${{ steps.plan.outputs.exit_code }}" >> $GITHUB_STEP_SUMMARY
          echo "- Expected: 2 (changes), 0 (no changes), or 1 (error)" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY"

      - name: Add Plan Summary to GitHub
        if: steps.plan.outputs.exit_code == '2'
        run: |
          echo "## 🚀 Terraform Plan Changes Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 📋 Plan Details" >> $GITHUB_STEP_SUMMARY
          echo '```terraform' >> $GITHUB_STEP_SUMMARY
          echo ${{ steps.plan.outputs.plan_output }} >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### 🔍 Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Plan Status: ✅ Changes detected" >> $GITHUB_STEP_SUMMARY
          echo "- Review required: ⚠️ Yes" >> $GITHUB_STEP_SUMMARY
          echo "- Action: Please review the plan output above before proceeding" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "- Exit Code Confirmed: 2" >> $GITHUB_STEP_SUMMARY

      - name: Add No Changes Summary to GitHub
        if: steps.plan.outputs.exit_code == '0'
        run: |
          echo "## ✅ No Terraform Changes Detected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📊 Status" >> $GITHUB_STEP_SUMMARY
          echo "- Plan Status: No changes detected" >> $GITHUB_STEP_SUMMARY
          echo "- Review required: No" >> $GITHUB_STEP_SUMMARY
          echo "- Action: Infrastructure is up to date" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
