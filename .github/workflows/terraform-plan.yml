name: Terraform Validate and Plan

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  id-token: write

env:
  AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ROLE_TO_ASSUME: ${{ secrets.ROLE_TO_ASSUME }}
  GITHUB_REPO_NAME: ${{ github.event.repository.name }}

jobs:
  terraform:
    name: Terraform Validate and Plan
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: "1.14.0"

      - name: Configure AWS Credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=terraform-state-$AWS_ACCOUNT_ID-$AWS_REGION" \
            -backend-config="key=$GITHUB_REPO_NAME/dev/terraform.tfstate" \
            -backend-config="region=$AWS_REGION" \
            -backend-config="encrypt=true" \
            -backend-config="use_lockfile=true"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: |
          # Run plan and SAVE output to a file
          terraform plan -detailed-exitcode -no-color 2>&1 > plan_output.txt

          # Get REAL Terraform exit code
          PLAN_EXIT_CODE=$?
          PLAN_OUTPUT=$(cat plan_output.txt)

          # Show full output
          echo "=== Terraform Plan Output ==="
          echo "$PLAN_OUTPUT"
          echo "============================="
          echo "Terraform Exit Code: $PLAN_EXIT_CODE"

          # Set outputs for next steps
          echo "exit_code=$PLAN_EXIT_CODE" >> $GITHUB_OUTPUT
          echo "plan_output<<EOF" >> $GITHUB_OUTPUT
          echo "$PLAN_OUTPUT"
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Add Plan Output to GitHub Summary
        run: |
          echo "# 📋 Terraform Plan Result" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          EXIT_CODE=${{ steps.plan.outputs.exit_code }}

          if [ $EXIT_CODE -eq 0 ]; then
            echo "✅ **No changes detected**" >> $GITHUB_STEP_SUMMARY
          elif [ $EXIT_CODE -eq 2 ]; then
            echo "✅ **Changes detected**" >> $GITHUB_STEP_SUMMARY
          elif [ $EXIT_CODE -eq 1 ]; then
            echo "❌ **Plan failed**" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Full Plan Output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.terraform-plan.outputs.plan_output }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Final Result Check
        run: |
          EXIT_CODE=${{ steps.plan.outputs.exit_code }}
          if [ $EXIT_CODE -eq 1 ]; then
            echo "❌ Plan failed"
            exit 1
          fi
