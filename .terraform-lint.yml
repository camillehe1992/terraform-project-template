# Terraform Lint Configuration

# Enable all rules by default
rule:
  enabled: true

# Disable specific rules if needed
rules:
  # Allow terraform and variable blocks to be empty
  terraform_naming_convention:
    enabled: true
    format: snake_case

  terraform_documented_variables:
    enabled: true

  terraform_documented_outputs:
    enabled: true

  terraform_typed_variables:
    enabled: true

# Configuration for specific rules
config:
  # Maximum line length
  max_line_length: 120

  # Require specific tags for AWS resources
  aws_resource_missing_tags:
    enabled: true
    tags:
      - Repository
      - ManagedBy

# Exclude specific files or directories
exclude:
  - .terraform/**
  - terraform.tfstate*
  - terraform.tfplan
